<h1>FXとは？初心者向け基礎解説</h1>

<p>FXとは「外国為替証拠金取引」の略で、通貨を売買して利益を狙う投資です。</p>

<p>例えば、ドル円を安く買って高く売ることで差額が利益になります。</p>

<h2>FXの特徴</h2>
<ul>
<li>少額から始められる</li>
<li>平日ほぼ24時間取引可能</li>
<li>レバレッジを使える</li>
</ul>

<p>初心者はまず少額から始め、仕組みを理解することが重要です。</p>
