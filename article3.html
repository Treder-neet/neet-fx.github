<h1>FXのスプレッドとは？</h1>

<p>スプレッドとは売値と買値の差のことです。これが実質的な手数料になります。</p>

<h2>具体例</h2>
<p>ドル円が150.000（買）149.998（売）の場合、差の0.002円がスプレッドです。</p>

<h2>なぜ重要？</h2>
<p>取引回数が多い人ほどコスト差が大きくなります。</p>
